{% extends "base.html" %}
{% block title %}My Marks — College ERP{% endblock %}
{% block page_title %}My Marks{% endblock %}
{% block content %}

<div class="card">

    <!-- ── Header: title + search ── -->
    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding-bottom:12px">
        <h2 class="card-title"><i class="fas fa-chart-bar"></i> Marks Breakdown</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <input type="text" id="search-input" class="marks-search-input" placeholder="Search course...">
            <button id="search-btn" class="btn btn-primary btn-sm"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>

    <!-- ── Category Tab Bar ── -->
    <div class="marks-tab-bar">
        <button class="marks-tab active" data-type="">
            <i class="fas fa-list"></i> All
            {% if marks_summary %}
            <span class="marks-tab-badge">{{ marks_summary|sum(attribute='cnt') }}</span>
            {% endif %}
        </button>
        <button class="marks-tab" data-type="quiz">
            <i class="fas fa-pencil-alt"></i> Quizzes
            {% for s in marks_summary if 'quiz' in s.exam_type|lower %}
            <span class="marks-tab-badge">{{ s.cnt }}</span>
            {% endfor %}
        </button>
        <button class="marks-tab" data-type="assignment">
            <i class="fas fa-file-alt"></i> Assignments
            {% for s in marks_summary if 'assign' in s.exam_type|lower %}
            <span class="marks-tab-badge">{{ s.cnt }}</span>
            {% endfor %}
        </button>
        <button class="marks-tab" data-type="midterm">
            <i class="fas fa-book-open"></i> Midterms
            {% for s in marks_summary if 'mid' in s.exam_type|lower %}
            <span class="marks-tab-badge">{{ s.cnt }}</span>
            {% endfor %}
        </button>
        <button class="marks-tab" data-type="final">
            <i class="fas fa-graduation-cap"></i> Finals
            {% for s in marks_summary if 'final' in s.exam_type|lower %}
            <span class="marks-tab-badge">{{ s.cnt }}</span>
            {% endfor %}
        </button>
    </div>

    <!-- ── Summary strip per active category (JS-rendered) ── -->
    <div id="marks-summary-strip" style="display:none;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg-surface)">
        <span id="marks-strip-text" style="font-size:.85rem;color:var(--text-muted)"></span>
    </div>

    <!-- ── Table with scrollbar (isolated from global scripts) ── -->
    <div class="table-container" id="marks-scroll-container"
         data-url="{{ url_for('student.marks') }}"
         style="max-height:560px;overflow-y:auto;overflow-x:hidden">
        <table style="width:100%">
            <thead>
                <tr>
                    <th>Course</th>
                    <th>Exam Type</th>
                    <th>Obtained</th>
                    <th>Total</th>
                    <th>Percentage</th>
                    <th>Remarks</th>
                </tr>
            </thead>
            <tbody id="marks-table-body"></tbody>
        </table>
    </div>

</div>

{% endblock %}

{% block scripts %}
<script>
(function () {
    /* ─── state ─── */
    const container   = document.getElementById('marks-scroll-container');
    const tbody       = document.getElementById('marks-table-body');
    const searchInput = document.getElementById('search-input');
    const searchBtn   = document.getElementById('search-btn');
    const summaryStrip = document.getElementById('marks-summary-strip');
    const summaryText  = document.getElementById('marks-strip-text');
    const dataUrl     = container.getAttribute('data-url');
    const tabs        = document.querySelectorAll('.marks-tab');

    let currentQ = '', currentType = '';
    let isLoading = false;
    let abortController = null;

    /* ─── helpers ─── */
    function showMsg(html) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px">${html}</td></tr>`;
    }

    function updateSummary(totalCount) {
        let label = 'All Marks';
        const activeTab = document.querySelector('.marks-tab.active');
        if (activeTab) {
            // Extract text node after the icon
            const nodes = activeTab.childNodes;
            for(let node of nodes) {
                if (node.nodeType === 3 && node.textContent.trim()) {
                    label = node.textContent.trim();
                    break;
                }
            }
        }

        let text = `Showing: <strong>${label}</strong>`;
        if (currentQ) text += ` matching "<strong>${currentQ}</strong>"`;
        text += ` — <strong>${totalCount}</strong> result${totalCount === 1 ? '' : 's'} found`;
        
        summaryText.innerHTML = text;
        summaryStrip.style.display = (currentType || currentQ) ? 'block' : 'none';
    }

    function load() {
        // Abort previous request if user switched filters fast
        if (abortController) {
            abortController.abort();
            isLoading = false;
        }

        isLoading = true;
        showMsg('<i class="fas fa-spinner fa-spin"></i> Loading data...'); 

        abortController = new AbortController();
        const url = new URL(dataUrl, location.origin);
        url.searchParams.set('ajax', '1');
        url.searchParams.set('q',    currentQ);
        url.searchParams.set('exam_type', currentType);

        fetch(url, { signal: abortController.signal })
            .then(r => r.json())
            .then(d => {
                tbody.innerHTML = d.html || '';
                
                if (!d.count || d.count === 0) {
                    showMsg('No marks found matching your criteria.');
                }

                updateSummary(d.total_filtered || d.count || 0);
                isLoading = false;
                abortController = null;
            })
            .catch(err => { 
                if (err.name === 'AbortError') return; 
                console.error(err);
                showMsg('<span style="color:var(--danger)">Error loading marks. Please try again.</span>'); 
                isLoading = false; 
                abortController = null;
            });
    }

    /* ─── tab switching ─── */
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            if (isLoading && tab.classList.contains('active')) return;
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentType = tab.dataset.type || '';
            load();
        });
    });

    /* ─── search ─── */
    const handleSearch = () => { 
        const newQ = searchInput.value.trim();
        if (newQ === currentQ) return; 
        currentQ = newQ; 
        load(); 
    };
    searchBtn.addEventListener('click', handleSearch);
    searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSearch(); });

    /* ─── initial load ─── */
    load();
})();
</script>
{% endblock %}
