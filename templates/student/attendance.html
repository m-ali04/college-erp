{% extends "base.html" %}
{% block title %}My Attendance — College ERP{% endblock %}
{% block page_title %}Attendance Summary{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2 class="card-title"><i class="fas fa-calendar-check"></i> Attendance Per Course</h2>
        <div class="search-box" style="display: flex; gap: 10px;">
            <input type="text" id="search-input" class="form-control" placeholder="Search code, name..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text);">
            <button id="search-btn" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>
    <div class="table-container" id="infinite-scroll-container" data-url="{{ url_for('student.attendance') }}" style="max-height: 600px; overflow-y: auto;">
        <table style="width: 100%;">
            <thead><tr><th>Course</th><th>Present</th><th>Late</th><th>Absent</th><th>Total</th><th>Rate</th><th>Progress</th></tr></thead>
            <tbody id="infinite-table-body">
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
