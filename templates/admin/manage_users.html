{% extends "base.html" %}
{% block title %}Manage Users — College ERP{% endblock %}
{% block page_title %}Manage Users{% endblock %}
{% block content %}

<!-- Create User Form -->
<div class="card mb-3">
    <div class="card-header"><h2 class="card-title"><i class="fas fa-user-plus"></i> Create New User</h2></div>
    <form method="POST" action="{{ url_for('admin.create_user') }}">
        <div class="form-grid">
            <div class="form-group">
                <label for="full_name">Full Name *</label>
                <input type="text" id="full_name" name="full_name" required placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="Enter email">
            </div>
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>
            <div class="form-group">
                <label for="roleSelect">Role *</label>
                <select id="roleSelect" name="role" required>
                    <option value="">Select Role</option>
                    <option value="admin">Admin</option>
                    <option value="teacher">Teacher</option>
                    <option value="student">Student</option>
                </select>
            </div>
        </div>

        <!-- Student-specific fields -->
        <div id="studentFields" style="display:none" class="mt-2">
            <h3 class="section-title mb-2">Student Details</h3>
            <div class="form-grid">
                <div class="form-group"><label>Roll Number</label><input type="text" name="roll_no" placeholder="e.g. CS-2024-001"></div>
                <div class="form-group"><label>Department</label><input type="text" name="s_department" placeholder="e.g. Computer Science"></div>
                <div class="form-group"><label>Batch Year</label><input type="number" name="batch_year" placeholder="e.g. 2024"></div>
                <div class="form-group"><label>Section</label><input type="text" name="section" placeholder="e.g. A"></div>
            </div>
        </div>

        <!-- Teacher-specific fields -->
        <div id="teacherFields" style="display:none" class="mt-2">
            <h3 class="section-title mb-2">Teacher Details</h3>
            <div class="form-grid">
                <div class="form-group"><label>Employee Code</label><input type="text" name="employee_code" placeholder="e.g. EMP-001"></div>
                <div class="form-group"><label>Department</label><input type="text" name="t_department" placeholder="e.g. Computer Science"></div>
                <div class="form-group"><label>Designation</label><input type="text" name="designation" placeholder="e.g. Assistant Professor"></div>
            </div>
        </div>

        <div class="mt-2"><button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Create User</button></div>
    </form>
</div>

<!-- Users Table -->
<div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2 class="card-title"><i class="fas fa-list"></i> All Users</h2>
        <div class="search-box" style="display: flex; gap: 10px;">
            <input type="text" id="search-input" class="form-control" placeholder="Search name, email, or role..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text);">
            <button id="search-btn" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>
    <div class="table-container" id="infinite-scroll-container" data-url="{{ url_for('admin.manage_users') }}" style="max-height: 600px; overflow-y: auto;">
        <table style="width: 100%;">
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Details</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody id="infinite-table-body">
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
