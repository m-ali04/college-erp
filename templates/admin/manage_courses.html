{% extends "base.html" %}
{% block title %}Manage Courses — College ERP{% endblock %}
{% block page_title %}Manage Courses{% endblock %}
{% block content %}

<div class="card mb-3">
    <div class="card-header"><h2 class="card-title"><i class="fas fa-plus-circle"></i> Add New Course</h2></div>
    <form method="POST" action="{{ url_for('admin.create_course') }}">
        <div class="form-grid">
            <div class="form-group"><label>Course Code *</label><input type="text" name="course_code" required placeholder="e.g. CS-101"></div>
            <div class="form-group"><label>Course Name *</label><input type="text" name="course_name" required placeholder="e.g. Data Structures"></div>
            <div class="form-group"><label>Credit Hours *</label><input type="number" name="credit_hours" required min="1" placeholder="e.g. 3"></div>
            <div class="form-group"><label>Department</label><input type="text" name="department" placeholder="e.g. Computer Science"></div>
        </div>
        <div class="mt-2"><button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Add Course</button></div>
    </form>
</div>

<div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2 class="card-title"><i class="fas fa-book"></i> All Courses</h2>
        <div class="search-box" style="display: flex; gap: 10px;">
            <input type="text" id="search-input" class="form-control" placeholder="Search code, name..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text);">
            <button id="search-btn" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>
    <div class="table-container" id="infinite-scroll-container" data-url="{{ url_for('admin.manage_courses') }}" style="max-height: 600px; overflow-y: auto;">
        <table style="width: 100%;">
            <thead><tr><th>Code</th><th>Name</th><th>Credits</th><th>Department</th><th>Actions</th></tr></thead>
            <tbody id="infinite-table-body">
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
