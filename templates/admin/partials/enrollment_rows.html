{% for e in enrollments %}
<tr>
    <td>{{ e.full_name }}</td>
    <td>{{ e.roll_no or '—' }}</td>
    <td>{{ e.course_code }} — {{ e.course_name }}</td>
    <td>{{ e.semester }}</td>
    <td>{{ e.academic_year }}</td>
    <td>
        <form method="POST" action="{{ url_for('admin.delete_enrollment', enrollment_id=e.enrollment_id) }}" style="display:inline">
            <button type="button" class="btn btn-danger btn-sm" onclick="confirmDelete(this.parentElement, 'enrollment')"><i class="fas fa-trash"></i></button>
        </form>
    </td>
</tr>
{% endfor %}
