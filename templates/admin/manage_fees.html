{% extends "base.html" %}
{% block title %}Manage Fees — College ERP{% endblock %}
{% block page_title %}Manage Fees{% endblock %}
{% block content %}

<div class="card mb-3">
    <div class="card-header"><h2 class="card-title"><i class="fas fa-file-invoice-dollar"></i> Issue New Fee</h2></div>
    <form method="POST" action="{{ url_for('admin.create_fee') }}">
        <div class="form-grid">
            <div class="form-group">
                <label>Student *</label>
                <select name="student_id" class="searchable" required>
                    <option value="">Select Student</option>
                    {% for s in students %}<option value="{{ s.student_id }}">{{ s.roll_no or 'N/A' }} — {{ s.full_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Fee Type *</label>
                <input type="text" name="fee_type" required placeholder="e.g. Tuition Fee - Fall 2026">
            </div>
            <div class="form-group">
                <label>Amount (Rs.) *</label>
                <input type="number" name="amount" required step="0.01" min="0.01" placeholder="e.g. 1500.00">
            </div>
            <div class="form-group">
                <label>Due Date *</label>
                <input type="date" name="due_date" required>
            </div>
        </div>
        <div class="mt-2"><button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Issue Fee</button></div>
    </form>
</div>

<div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2 class="card-title"><i class="fas fa-list"></i> All Fee Records</h2>
        <div class="search-box" style="display: flex; gap: 10px;">
            <input type="text" id="search-input" class="form-control" placeholder="Search student, roll, or fee type..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text);">
            <button id="search-btn" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>
    <div class="table-container" id="infinite-scroll-container" data-url="{{ url_for('admin.manage_fees') }}" style="max-height: 600px; overflow-y: auto;">
        <table style="width: 100%;">
            <thead><tr><th>Student</th><th>Roll No</th><th>Fee Type</th><th>Amount</th><th>Due Date</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="infinite-table-body">
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
