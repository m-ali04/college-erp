{% extends "base.html" %}
{% block title %}Course Assignments — College ERP{% endblock %}
{% block page_title %}Course Assignments{% endblock %}
{% block content %}

<div class="card mb-3">
    <div class="card-header"><h2 class="card-title"><i class="fas fa-chalkboard-teacher"></i> Assign Teacher to Course</h2></div>
    <form method="POST" action="{{ url_for('admin.create_assignment') }}">
        <div class="form-grid">
            <div class="form-group">
                <label>Teacher *</label>
                <select name="teacher_id" required>
                    <option value="">Select Teacher</option>
                    {% for t in teachers %}<option value="{{ t.teacher_id }}">{{ t.employee_code or 'N/A' }} — {{ t.full_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Course *</label>
                <select name="course_id" required>
                    <option value="">Select Course</option>
                    {% for c in courses %}<option value="{{ c.course_id }}">{{ c.course_code }} — {{ c.course_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group"><label>Semester *</label><input type="text" name="semester" required placeholder="e.g. Fall"></div>
            <div class="form-group"><label>Academic Year *</label><input type="text" name="academic_year" required placeholder="e.g. 2025-26"></div>
        </div>
        <div class="mt-2"><button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Assign</button></div>
    </form>
</div>

<div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2 class="card-title"><i class="fas fa-list"></i> All Assignments</h2>
        <div class="search-box" style="display: flex; gap: 10px;">
            <input type="text" id="search-input" class="form-control" placeholder="Search teacher, emp code, or course..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text);">
            <button id="search-btn" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>
    <div class="table-container" id="infinite-scroll-container" data-url="{{ url_for('admin.manage_assignments') }}" style="max-height: 600px; overflow-y: auto;">
        <table style="width: 100%;">
            <thead><tr><th>Teacher</th><th>Emp Code</th><th>Course</th><th>Semester</th><th>Year</th><th>Actions</th></tr></thead>
            <tbody id="infinite-table-body">
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
