{% extends "base.html" %}
{% block title %}Manage Enrollments — College ERP{% endblock %}
{% block page_title %}Manage Enrollments{% endblock %}
{% block content %}

<div class="card mb-3">
    <div class="card-header"><h2 class="card-title"><i class="fas fa-user-plus"></i> Enroll Student in Course</h2></div>
    <form method="POST" action="{{ url_for('admin.create_enrollment') }}">
        <div class="form-grid">
            <div class="form-group">
                <label>Student *</label>
                <select name="student_id" class="searchable" required>
                    <option value="">Select Student</option>
                    {% for s in students %}<option value="{{ s.student_id }}">{{ s.roll_no or 'N/A' }} — {{ s.full_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Course *</label>
                <select name="course_id" class="searchable" required>
                    <option value="">Select Course</option>
                    {% for c in courses %}<option value="{{ c.course_id }}">{{ c.course_code }} — {{ c.course_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group"><label>Semester *</label><input type="text" name="semester" required placeholder="e.g. Fall"></div>
            <div class="form-group"><label>Academic Year *</label><input type="text" name="academic_year" required placeholder="e.g. 2025-26"></div>
        </div>
        <div class="mt-2"><button type="submit" class="btn btn-primary"><i class="fas fa-plus"></i> Enroll</button></div>
    </form>
</div>

<div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2 class="card-title"><i class="fas fa-list"></i> All Enrollments</h2>
        <div class="search-box" style="display: flex; gap: 10px;">
            <input type="text" id="search-input" class="form-control" placeholder="Search student, roll, or course..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text);">
            <button id="search-btn" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>
    <div class="table-container" id="infinite-scroll-container" data-url="{{ url_for('admin.manage_enrollments') }}" style="max-height: 600px; overflow-y: auto;">
        <table style="width: 100%;">
            <thead><tr><th>Student</th><th>Roll No</th><th>Course</th><th>Semester</th><th>Year</th><th>Actions</th></tr></thead>
            <tbody id="infinite-table-body">
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
