{% extends "base.html" %}
{% block title %}Announcements — College ERP{% endblock %}
{% block page_title %}Announcements{% endblock %}
{% block content %}

<div class="card mb-3">
    <div class="card-header"><h2 class="card-title"><i class="fas fa-bullhorn"></i> Post Course Announcement</h2></div>
    <form method="POST" action="{{ url_for('teacher.announcements') }}">
        <div class="form-grid">
            <div class="form-group">
                <label>Course *</label>
                <select name="course_id" required>
                    <option value="">Select Course</option>
                    {% for c in courses %}<option value="{{ c.course_id }}">{{ c.course_code }} — {{ c.course_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group"><label>Title *</label><input type="text" name="title" required placeholder="Announcement title"></div>
            <div class="form-group full-width"><label>Body *</label><textarea name="body" required placeholder="Write your announcement..."></textarea></div>
        </div>
        <div class="mt-2"><button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Post</button></div>
    </form>
</div>

<div class="card">
    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2 class="card-title"><i class="fas fa-list"></i> My Announcements</h2>
        <div class="search-box" style="display: flex; gap: 10px;">
            <input type="text" id="search-input" class="form-control" placeholder="Search title, body..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text);">
            <button id="search-btn" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
        </div>
    </div>
    <div class="announcement-list" id="infinite-scroll-container" data-url="{{ url_for('teacher.announcements') }}" style="max-height: 600px; overflow-y: auto;">
        <div id="infinite-table-body" style="display: flex; flex-direction: column; gap: 1rem;">
            <!-- Announcements loaded via AJAX -->
        </div>
    </div>
</div>
{% endblock %}
