{% for a in announcements %}
<div class="announcement-card">
    <div class="meta">
        <span><i class="fas fa-clock"></i> {{ a.created_at.strftime('%b %d, %Y at %I:%M %p') }}</span>
        {% if a.course_code %}<span class="course-tag"><i class="fas fa-book"></i> {{ a.course_code }}</span>{% endif %}
    </div>
    <h3>{{ a.title }}</h3>
    <p class="body">{{ a.body }}</p>
</div>
{% endfor %}
